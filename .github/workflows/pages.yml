name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir _site
          cp -r public/* _site/
          cp index.html _site/ || true
          cp calculadora.html _site/ || true
          cp estimator.html _site/ || true
          cp CNAME _site/ || true
          cp robots.txt _site/ || true
          cp sitemap.xml _site/ || true
          cp logo-blanco.png _site/ || true
          cp logo-original.jpg _site/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
